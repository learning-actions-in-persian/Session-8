name: Python CI & Build

permissions:
  contents: write

on:
  push:
    paths:
      - "*.py"
      - ".github/workflows/python*"
  release:
    types: [published]

jobs:
  setup-python:
    name: Setup Python workspace
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Create venv & install dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt

      - name: Upload workspace as artefact
        uses: actions/upload-artifact@v4
        with:
          name: python-workspace
          path: ./

  lint-python:
    name: Lint Python code
    needs: setup-python
    runs-on: ubuntu-latest

    steps:
      - name: Download workspace
        uses: actions/download-artifact@v4
        with:
          name: python-workspace

      - name: Restore the same Python version
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Restore venv script permissions
        run: chmod -R +x venv/bin

      - name: Run pylint
        run: venv/bin/pylint *.py

  test-python:
    name: Run tests
    needs: setup-python
    runs-on: ubuntu-latest

    steps:
      - name: Download workspace
        uses: actions/download-artifact@v4
        with:
          name: python-workspace

      - name: Restore the same Python version
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Restore venv script permissions
        run: chmod -R +x venv/bin

      - name: Run pytest
        run: venv/bin/pytest test.py

  build:
    name: Build release binaries
    if: github.event_name == 'release' && github.event.action == 'published'
    needs: test-python
    runs-on: ubuntu-latest

    steps:
      - name: Download workspace
        uses: actions/download-artifact@v4
        with:
          name: python-workspace

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Build amd64 executable
        uses: learning-actions-in-persian/custom-action@main
        with:
          arch: x86_64
          
      - name: Build arm64 executable
        uses: learning-actions-in-persian/custom-action@main
        with:
          arch: arm64

      - name: Upload binary to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/python_web_hello_world_Linux*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
